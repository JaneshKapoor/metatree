version: "3.9"

# Local OpenMetadata stack for MetaTree development.
# Starts OpenMetadata server + MySQL + Elasticsearch on localhost:8585.
# After `docker compose up -d`, set:
#   OPENMETADATA_HOST=http://localhost:8585/api
#   OPENMETADATA_JWT_TOKEN=<copy from Settings -> Bots -> ingestion-bot>
services:
  mysql:
    image: docker.getcollate.io/openmetadata/db:1.5.0
    container_name: metatree_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: metatree_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:1.5.0
    container_name: metatree_openmetadata
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      AUTHORIZER_ENABLE_SECURE_SOCKET: "false"
    ports:
      - "8585:8585"
      - "8586:8586"
